---
name: neocmakelsp
version: "0.1.0"
homepage: https://github.com/neocmakelsp/neocmakelsp
description: Another cmake lsp

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm neocmakelsp
  check: command -v neocmakelsp
  dependencies: [cargo-binstall]

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
