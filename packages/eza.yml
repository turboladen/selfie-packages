---
name: eza
version: "0.1.0"
homepage: https://github.com/eza-community/eza
description: A modern, maintained replacement for ls

environments:
  macos-work:
    install: brew install eza
    check: command -v eza
    dependencies:
      - homebrew
  arch-home:
    install: sudo pacman -S --noconfirm --needed eza
    check: command -v eza
    dependencies: []
