---
name: bun
version: 0.1.0
homepage:
description:

_curl_install: &curl_install
  install: |
    set -e
    curl -fsSL https://bun.sh/install | bash
  check: |
    command -v bun && \
      bun --version
  dependencies: [curl]

environments:
  macos-home: *curl_install
  macos-work: *curl_install
