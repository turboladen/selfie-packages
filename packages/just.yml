---
name: just
version: 0.1.0
homepage: https://just.systems
description: Just a command runner

_brew: &brew
  install: brew install just
  check: command -v just
  dependencies: [homebrew]

environments:
  macos-home: *brew
  macos-work: *brew
  arch-home:
    install: sudo pacman -S --noconfirm --needed just
    check: command -v just
    dependencies: []
