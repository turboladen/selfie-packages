---
name: vale
version: "0.1.0"
homepage: https://vale.sh/
description: Syntax-aware linter for prose

_brew: &brew
  install: |
    set -e
    brew install vale
    echo "Don't forget to install writing styles (proselint, write-good)"
  check: command -v vale
  dependencies:
    - homebrew

environments:
  macos-home: *brew
  macos-work: *brew
