name: fish-lsp
version: 0.1.0
homepage: https://www.fish-lsp.dev/
description: fish-lsp is a language server protocol (LSP) implementation for the fish shell.
environments:
  macos-home:
    install: $HOME/.bun/bin/bun install --global fish-lsp
    check: '[ -x "$HOME/.bun/bin/fish-lsp" ] || command -v fish-lsp'
    dependencies:
    - bun
  macos-work:
    install: $HOME/.bun/bin/bun install --global fish-lsp
    check: '[ -x "$HOME/.bun/bin/fish-lsp" ] || command -v fish-lsp'
    dependencies:
    - bun
