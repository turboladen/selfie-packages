---
name: fish-lsp
version: "0.1.0"
homepage: https://www.fish-lsp.dev/
description: fish-lsp is a language server protocol (LSP) implementation for the fish shell.

_bun_install: &bun_install
  install: bun install --global fish-lsp
  check: command -v fish-lsp
  dependencies: [bun]

environments:
  macos-home: *bun_install
  macos-work: *bun_install
