---
name: cargo-sweep
version: "0.1.0"
homepage: https://github.com/holmgr/cargo-sweep
description: A cargo subcommand for cleaning up unused build files generated by Cargo 

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-sweep
  check: command -v cargo-sweep
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
