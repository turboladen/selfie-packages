---
name: curl
version: 0.1.0
homepage: https://curl.se/
description: command line tool and library for transferring data with URLs (since 1998)

environments:
  macos-work:
    install: echo "Using OS-provided curl"
    check: command -v curl
  arch-home:
    install: sudo pacman --sync --noconfirm --needed curl
    check: command -v curl
