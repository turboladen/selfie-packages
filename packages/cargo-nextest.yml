---
name: cargo-nextest
version: 0.1.0
homepage: https://github.com/nextest-rs/nextest
description: A next-generation test runner for Rust

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-nextest
  check: command -v cargo-nextest
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
