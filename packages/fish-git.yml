---
name: fish-git
version: 0.1.0
homepage: https://github.com/jhillyerd/plugin-git
description: Git aliases plugin for the Fish shell (similar to oh-my-zsh git)

_fisher: &fisher
  install: fish -c "fisher install jhillyerd/plugin-git"
  check: ls ~/.config/fish/conf.d/git.fish &> /dev/null
  dependencies:
    - fish-fisher

environments:
  macos-home: *fisher
  macos-work: *fisher
