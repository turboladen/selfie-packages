---
name: bash-language-server
version: 0.1.0
homepage: https://github.com/bash-lsp/bash-language-server
description: A language server for Bash

_default_environment: &default_env
  install: npm i -g bash-language-server
  check: command -v bash-language-server
  dependencies:
    - shellcheck
    - nodejs

environments:
  macos-work:
    <<: *default_env
  arch-home:
    <<: *default_env
