---
name: bottom
version: 0.1.0
homepage: https://clementtsang.github.io/bottom/stable/
description: |
  A customizable cross-platform graphical process/system monitor for the terminal

  Note: I'm using the OS package manager instead of `cargo-binstall` so I don't have
  to deal with man page installation, etc.

_macos: &macos
  install: brew install bottom
  check: command -v btm
  dependencies: ["homebrew"]

environments:
  macos-home: *macos
  macos-work: *macos
