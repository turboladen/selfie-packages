name: yamllint
version: 0.1.0
homepage: https://github.com/adrienverge/yamllint
description: A linter for YAML files.
environments:
  macos-home:
    install: $HOME/.local/bin/uv tool install yamllint
    check: '[ -x "$HOME/.local/bin/yamllint" ] || command -v yamllint'
    dependencies:
    - uv
  macos-work:
    install: $HOME/.local/bin/uv tool install yamllint
    check: '[ -x "$HOME/.local/bin/yamllint" ] || command -v yamllint'
    dependencies:
    - uv
