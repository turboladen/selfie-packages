---
name: zr
version: 0.1.0
homepage: https://github.com/jedahan/zr.git
description: quick, simple zsh package manager

environments:
  macos-home:
    install: cargo binstall --no-confirm zr
    check: command -v zr
    dependencies:
      - cargo-binstall

  macos-work:
    install: cargo binstall --no-confirm zr
    check: command -v zr
    dependencies:
      - cargo-binstall

