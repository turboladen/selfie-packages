---
name: typescript-language-server
version: "0.1.0"
homepage: https://github.com/typescript-language-server/typescript-language-server
description: TypeScript & JavaScript Language Server

_bun_install: &bun_install
  install: bun install --global typescript-language-server
  check: command -v typescript-language-server
  dependencies: [bun]

environments:
  macos-home: *bun_install
  macos-work: *bun_install
  arch-home: *bun_install
