name: fnm
version: 0.1.0
homepage: https://github.com/Schniz/fnm
description: 🚀 Fast and simple Node.js version manager, built in Rust
environments:
  macos-home:
    install: |
      set -e
      brew install fnm
      mkdir -p ~/.config/fish/conf.d
      printf 'source (fnm env --use-on-cd --shell fish | psub)\nfnm use default --silent-if-unchanged 2>/dev/null; or true\n' > ~/.config/fish/conf.d/fnm.fish
      mkdir -p ~/.config/fish/completions
      fnm completions --shell fish > ~/.config/fish/completions/fnm.fish
    check: |
      set -e
      command -v fnm
      ls ~/.config/fish/conf.d/fnm.fish &> /dev/null
      grep -q 'fnm env' ~/.config/fish/conf.d/fnm.fish
    dependencies:
    - homebrew
  arch-home:
    install: |
      set -e
      sudo pacman -S --noconfirm --needed fnm
      mkdir -p ~/.config/fish/conf.d
      printf 'source (fnm env --use-on-cd --shell fish | psub)\nfnm use default --silent-if-unchanged 2>/dev/null; or true\n' > ~/.config/fish/conf.d/fnm.fish
      mkdir -p ~/.config/fish/completions
      fnm completions --shell fish > ~/.config/fish/completions/fnm.fish
    check: |
      set -e
      command -v fnm
      ls ~/.config/fish/conf.d/fnm.fish &> /dev/null
      grep -q 'fnm env' ~/.config/fish/conf.d/fnm.fish
    dependencies: []
  macos-work:
    install: |
      set -e
      brew install fnm
      mkdir -p ~/.config/fish/conf.d
      printf 'source (fnm env --use-on-cd --shell fish | psub)\nfnm use default --silent-if-unchanged 2>/dev/null; or true\n' > ~/.config/fish/conf.d/fnm.fish
      mkdir -p ~/.config/fish/completions
      fnm completions --shell fish > ~/.config/fish/completions/fnm.fish
    check: |
      set -e
      command -v fnm
      ls ~/.config/fish/conf.d/fnm.fish &> /dev/null
      grep -q 'fnm env' ~/.config/fish/conf.d/fnm.fish
    dependencies:
    - homebrew
