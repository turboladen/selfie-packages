name: shfmt
version: 0.1.0
homepage: https://github.com/patrickvane/shfmt
description: A shell formatter (sh/bash/mksh)
environments:
  macos-work:
    install: brew install shfmt
    check: command -v shfmt
    dependencies:
    - homebrew
  macos-home:
    install: brew install shfmt
    check: command -v shfmt
    dependencies:
    - homebrew
