---
name: zed
version: 0.1.0
homepage: https://zed.dev
description: Zed is a minimal code editor crafted for speed and collaboration with humans and AI.

_macos: &macos
  install: brew install --cask zed
  check: ls /Applications/Zed.app/ &> /dev/null
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos
