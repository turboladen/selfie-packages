---
name: cargo-hack
version: 0.1.0
homepage: https://github.com/taiki-e/cargo-hack
description: Cargo subcommand to provide various options useful for testing and continuous integration. 

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-hack
  check: command -v cargo-hack
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
