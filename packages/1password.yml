name: 1password
version: 0.1.0
homepage: https://1password.com
description: More than a password manager
environments:
  macos-work:
    install: |
      set -e
      # Note: 1password must be installed to /Applications, not ~/Applications
      brew install --cask 1password
      brew install --cask 1password-cli
    check: |
      set -e
      ls /Applications/1Password.app/ &> /dev/null
      command -v op
    dependencies:
    - homebrew
  macos-home:
    install: |
      set -e
      # Note: 1password must be installed to /Applications, not ~/Applications
      brew install --cask 1password
      brew install --cask 1password-cli
    check: |
      set -e
      ls /Applications/1Password.app/ &> /dev/null
      command -v op
    dependencies:
    - homebrew
  arch-home:
    install: sudo pacman --sync --noconfirm --needed 1password
    check: command -v 1password
    dependencies: []
