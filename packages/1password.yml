---
name: 1password
version: 0.1.0
homepage: https://1password.com
description: More than a password manager

_macos: &macos
  install: |
    set -e
    # 1password doen't work in ~/Applications
    brew install --cask 1password
    brew install --cask 1password-cli
  check: |
    set -e
    ls /Applications/1Password.app/ &> /dev/null
    command -v op
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos

  arch-home:
    install: sudo pacman --sync --noconfirm --needed 1password
    check: command -v 1password
    dependencies: []
