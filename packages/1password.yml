---
name: 1password
version: 0.1.0
homepage: https://1password.com
description: More than a password manager

environments:
  macos-home:
    install: brew install --cask 1password-cli
    check: command -v op
    dependencies:
      - homebrew

  macos-work:
    install: HOMEBREW_CASK_OPTS="--appdir=~/Applications" brew install --cask 1password-cli
    check: command -v op
    dependencies:
      - homebrew

  arch-home:
    install: sudo pacman --sync --noconfirm --needed 1password
    check: command -v 1password
    dependencies: []
