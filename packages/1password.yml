---
name: 1password
version: 0.1.0
homepage: https://1password.com
description: More than a password manager

environments:
  macos-home:
    install: |
      set -e
      brew install --cask 1password
      brew install --cask 1password-cli
    check: |
      set -e
      brew list --cask 1password
      command -v op
    dependencies:
      - homebrew

  macos-work:
    install: |
      set -e
      HOMEBREW_CASK_OPTS="--appdir=~/Applications" brew install --cask 1password
      HOMEBREW_CASK_OPTS="--appdir=~/Applications" brew install --cask 1password-cli
    check: |
      brew list --cask 1password
      command -v op
    dependencies:
      - homebrew

  arch-home:
    install: sudo pacman --sync --noconfirm --needed 1password
    check: command -v 1password
    dependencies: []
