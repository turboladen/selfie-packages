name: clangd
version: 0.1.0
homepage: https://clangd.llvm.org
description: |
  clangd understands your C++ code and adds smart features to your editor: code completion,
  compile errors, go-to-definition and more.
environments:
  macos-home:
    install: echo "(Installed via llvm)"
    check: command -v clangd
    dependencies:
    - llvm
  arch-home:
    install: sudo pacman -S --noconfirm --needed clang
    check: command -v clangd
    dependencies: []
  macos-work:
    install: echo "(Installed via llvm)"
    check: command -v clangd
    dependencies:
    - llvm
