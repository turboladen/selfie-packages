---
name: alex
version: "0.1.0"
homepage: https://alexjs.com
description: Catch insensitive, inconsiderate writing

# Prefer the `npm` method, so as to not have the OS package manager install Node things.
_npm: &npm
  install: npm install --global alex
  check: command -v alex
  dependencies:
    - nodejs

environments:
  macos-work: *npm
  arch-home: *npm
