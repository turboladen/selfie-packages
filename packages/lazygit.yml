---
name: lazygit
version: 0.1.0
homepage: https://jesseduffield/lazygit
description: simpleterminal UI for git commands

_brew: &brew
  install: brew install lazygit
  check: command -v lazygit
  dependencies: [homebrew]

environments:
  macos-home: *brew
  macos-work: *brew
  arch-home:
    install: sudo pacman -S --noconfirm --needed lazygit
    check: command -v lazygit
    dependencies: []
