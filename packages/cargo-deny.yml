---
name: cargo-deny
version: 0.1.0
homepage: https://github.com/EmbarkStudios/cargo-deny
description: Cargo plugin for linting your dependencies

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-deny
  check: command -v cargo-deny
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
