name: homebrew
version: 0.1.0
homepage: https://brew.sh/
description: |
  The missing package manager for macOS — installs, updates, and manages software via simple CLI commands.

environments:
  macos-work:
    install: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    check: command -v brew
    dependencies:
      - bash
      - curl
  macos-home:
    install: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
    check: command -v brew
    dependencies:
      - bash
      - curl
