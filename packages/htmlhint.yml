name: htmlhint
version: 0.1.0
homepage: https://github.com/htmlhint/HTMLHint
description: The static code analysis tool you need for your HTML
environments:
  macos-work:
    install: $HOME/.bun/bin/bun install --global htmlhint
    check: '[ -x "$HOME/.bun/bin/htmlhint" ] || command -v htmlhint'
    dependencies:
    - bun
  macos-home:
    install: $HOME/.bun/bin/bun install --global htmlhint
    check: '[ -x "$HOME/.bun/bin/htmlhint" ] || command -v htmlhint'
    dependencies:
    - bun
