---
name: appcleaner
version: 0.1.0
homepage: https://freemacsoft.net/appcleaner/
description: AppCleaner is a small application which allows you to thoroughly uninstall unwanted apps.

_macos: &macos
  install: brew install --cask appcleaner
  check: brew list --cask appcleaner
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos
