---
name: gh
version: "0.1.0"
homepage: https://cli.github.com
description: GitHub CLI brings GitHub to your terminal.

_macos: &macos
  install: brew install gh
  check: command -v gh
  dependencies: [homebrew]

environments:
  macos-home: *macos
  macos-work: *macos

  arch-home:
    install: sudo pacman -S --noconfirm --needed github-cli
    check: command -v gh
    dependencies: []
