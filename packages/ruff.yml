name: ruff
version: 0.1.0
homepage: https://docs.astral.sh/ruff/
description: |
  An extremely fast Python linter and code formatter, written in Rust.
  NOTE: this also includes what's now the Ruff LSP (`ruff server`).
environments:
  macos-work:
    install: $HOME/.local/bin/uv tool install ruff
    check: '[ -x "$HOME/.local/bin/ruff" ] || command -v ruff'
    dependencies:
    - uv
  macos-home:
    install: $HOME/.local/bin/uv tool install ruff
    check: '[ -x "$HOME/.local/bin/ruff" ] || command -v ruff'
    dependencies:
    - uv
