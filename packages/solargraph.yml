---
name: solargraph
version: 0.1.0
homepage: 
description: 

_gem: &gem
  install: |
    set -e
    source $(brew --prefix)/opt/chruby/share/chruby/chruby.sh
    chruby 3
    gem install solargraph
  check: |
    set -e
    source $(brew --prefix)/opt/chruby/share/chruby/chruby.sh
    chruby 3
    command -v solargraph
  dependencies: [ruby]

environments:
  macos-home: *gem
  macos-work: *gem
