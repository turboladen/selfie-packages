---
name: solargraph
version: 0.1.0
homepage: https://solargraph.org
description: solargraph is a Ruby gem that provides intellisense features through MS's LSP.

_gem: &gem
  install: |
    set -e
    source $(brew --prefix)/opt/chruby/share/chruby/chruby.sh
    chruby 3
    gem install solargraph
  check: |
    set -e
    source $(brew --prefix)/opt/chruby/share/chruby/chruby.sh
    chruby 3
    command -v solargraph
  dependencies: [ruby]

environments:
  macos-home: *gem
  macos-work: *gem
