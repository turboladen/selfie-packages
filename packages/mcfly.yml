---
name: mcfly
version: 0.1.0
homepage: https://github.com/cantino/mcfly
description: Fly through your shell history. Great Scott!

_brew: &brew
  install: brew install mcfly
  check: command -v mcfly
  dependencies: [homebrew]

environments:
  macos-home: *brew
  macos-work: *brew
  arch-home:
    install: sudo pacman -S --noconfirm --needed mcfly
    check: command -v mcfly
    dependencies: []
