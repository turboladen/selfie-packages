name: lua
version: 0.1.0
homepage: https://www.lua.org/
description: Lightweight, embeddable scripting language — used heavily for Neovim plugin configuration.

environments:
  macos-home:
    install: brew install lua
    check: command -v lua
    dependencies:
      - homebrew
  macos-work:
    install: brew install lua
    check: command -v lua
    dependencies:
      - homebrew
