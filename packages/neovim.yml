---
name: neovim
version: 0.1.0
homepage: https://neovim.io
description: hyperextensible Vim-based text editor

environments:
  macos-work:
    install: brew install neovim
    check: command -v nvim
    dependencies:
      - tree-sitter
  arch-home:
    install: sudo pacman -S --noconfirm --needed neovim python-pynvim wl-clipboard
    check: command -v nvim
    dependencies:
      - tree-sitter

