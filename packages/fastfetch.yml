name: fastfetch
version: 0.1.0
homepage: https://github.com/fastfetch-cli/fastfetch
description: Like neofetch, but much faster because written mostly in C.
environments:
  macos-home:
    install: brew install fastfetch
    check: command -v fastfetch
    dependencies:
    - homebrew
  arch-home:
    install: sudo pacman -S --noconfirm --needed fastfetch
    check: command -v fastfetch
    dependencies: []
  macos-work:
    install: brew install fastfetch
    check: command -v fastfetch
    dependencies:
    - homebrew
