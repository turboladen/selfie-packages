name: ruby
version: 0.1.0
homepage: https://ruby-lang.org
description: |
  Dynamic, object-oriented programming language — installed via ruby-install and managed with chruby.
environments:
  macos-work:
    install: |
      set -e
      ruby-install --update
      # ruby-install --no-reinstall ruby -- --enable-shared --with-openssl-dir=$(brew --prefix openssl@1.1)
      ruby-install --no-reinstall ruby -- --enable-shared
    check: ls ~/.rubies/ruby-*/bin/ruby >/dev/null 2>&1
    dependencies:
    - ruby-install
    - homebrew
  macos-home:
    install: |
      set -e
      ruby-install --update
      # ruby-install --no-reinstall ruby -- --enable-shared --with-openssl-dir=$(brew --prefix openssl@1.1)
      ruby-install --no-reinstall ruby -- --enable-shared
    check: ls ~/.rubies/ruby-*/bin/ruby >/dev/null 2>&1
    dependencies:
    - ruby-install
    - homebrew
