---
name: yaml-language-server
version: "0.1.0"
homepage: https://github.com/redhat-developer/yaml-language-server
description: Language Server for YAML files

_bun_install: &bun_install
  install: bun install --global yaml-language-server
  check: command -v yaml-language-server
  dependencies: [bun]

environments:
  macos-home: *bun_install
  macos-work: *bun_install
