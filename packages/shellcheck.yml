---
name: shellcheck
version: 0.1.0
homepage: https://github.com/koalaman/shellcheck
description: ShellCheck, a static analysis tool for shell scripts

_brew: &brew
  install: brew install -v shellcheck
  check: command -v shellcheck
  dependencies: [homebrew]

environments:
  macos-home: *brew
  macos-work: *brew
