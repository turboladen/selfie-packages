---
name: tilt
version: "0.1.0"
homepage: https://tilt.dev
description: Define your dev environment as code. For microservice apps on Kubernetes

environments:
  macos-work:
    install: |
      set -e
      brew install tilt
      echo "tilt completion fish | source" >> ~/.config/fish/completions/tilt.fish
    check: command -v tilt
    dependencies:
      - homebrew

