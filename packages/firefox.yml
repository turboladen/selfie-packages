---
name: firefox
version: 0.1.0
homepage: https://www.firefox.com
description: Free and open source web browser

_macos: &macos
  install: brew install --cask firefox
  check: ls /Applications/Firefox.app/ &> /dev/null
  dependencies: [homebrew]

environments:
  macos-home: *macos
  macos-work: *macos
