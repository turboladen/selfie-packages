---
name: deno
version: "0.1.0"
homepage: https://deno.com
description: The next generation JavaScript runtime

_macos: &macos
  install: brew install deno
  check: command -v deno
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos
  arch-home:
    install: sudo pacman --sync --noconfirm --needed deno
    check: command -v deno
    dependencies: []
