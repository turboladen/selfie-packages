---
name: mas
version: 0.1.0
homepage: https://github.com/mas-cli/mas
description: Mac App Store command-line interface

environments:
  macos-home:
    install: brew install mas
    check: command -v mas
    dependencies:
      - homebrew

  macos-work:
    install: HOMEBREW_CASK_OPTS="--appdir=~/Applications" brew install mas
    check: command -v mas
    dependencies:
      - homebrew
