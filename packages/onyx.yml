---
name: onyx
version: 0.1.0
homepage: https://titanium-software.fr/en/onyx.html
description: |
  OnyX is a multifunction utility that you can use to verify the structure of
  the system files; perform cleaning and computer maintenance tasks; configure
  parameters in the Finder, Dock, Safari, and some Apple applications; delete
  caches; remove certain problematic folders and files; rebuild various
  databases and indexes; and more. It is a reliable application that provides a
  clean interface to many tasks that would otherwise require complex commands
  to be typed using a command–line interface.

_brew: &brew
  install: brew install --cask onyx
  check: ls /Applications/OnyX*.app/ &> /dev/null
  dependencies: [homebrew]

environments:
  macos-home: *brew
  macos-work: *brew
