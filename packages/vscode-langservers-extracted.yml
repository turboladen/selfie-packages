name: vscode-langservers-extracted
version: 0.1.0
homepage: https://github.com/hrsh7th/vscode-langservers-extracted
description: vscode-langservers bin collection.
environments:
  macos-home:
    install: $HOME/.bun/bin/bun install --global vscode-langservers-extracted
    check: |
      set -e
      [ -x "$HOME/.bun/bin/vscode-css-language-server" ] || command -v vscode-css-language-server
      [ -x "$HOME/.bun/bin/vscode-eslint-language-server" ] || command -v vscode-eslint-language-server
      [ -x "$HOME/.bun/bin/vscode-html-language-server" ] || command -v vscode-html-language-server
      [ -x "$HOME/.bun/bin/vscode-json-language-server" ] || command -v vscode-json-language-server
      [ -x "$HOME/.bun/bin/vscode-markdown-language-server" ] || command -v vscode-markdown-language-server
    dependencies:
    - bun
  arch-home:
    install: bun install --global vscode-langservers-extracted
    check: |
      set -e
      command -v vscode-css-language-server
      command -v vscode-eslint-language-server
      command -v vscode-html-language-server
      command -v vscode-json-language-server
      command -v vscode-markdown-language-server
    dependencies:
    - bun
  macos-work:
    install: $HOME/.bun/bin/bun install --global vscode-langservers-extracted
    check: |
      set -e
      [ -x "$HOME/.bun/bin/vscode-css-language-server" ] || command -v vscode-css-language-server
      [ -x "$HOME/.bun/bin/vscode-eslint-language-server" ] || command -v vscode-eslint-language-server
      [ -x "$HOME/.bun/bin/vscode-html-language-server" ] || command -v vscode-html-language-server
      [ -x "$HOME/.bun/bin/vscode-json-language-server" ] || command -v vscode-json-language-server
      [ -x "$HOME/.bun/bin/vscode-markdown-language-server" ] || command -v vscode-markdown-language-server
    dependencies:
    - bun
