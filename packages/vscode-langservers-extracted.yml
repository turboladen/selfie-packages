---
name: vscode-langservers-extracted
version: "0.1.0"
homepage: https://github.com/hrsh7th/vscode-langservers-extracted
description: vscode-langservers bin collection.

_bun_install: &bun_install
  install: bun install --global vscode-langservers-extracted
  check: |
    set -e
    command -v vscode-css-language-server
    command -v vscode-eslint-language-server
    command -v vscode-html-language-server
    command -v vscode-json-language-server
    command -v vscode-markdown-language-server
  dependencies:
    - bun

environments:
  macos-home: *bun_install
  macos-work: *bun_install
  arch-home: *bun_install
