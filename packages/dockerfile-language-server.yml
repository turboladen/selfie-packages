name: dockerfile-language-server
version: 0.1.0
homepage: https://github.com/rcjsuen/dockerfile-language-server
description: |
  A language server for Dockerfiles powered by Node.js, TypeScript,
  and VSCode technologies.
environments:
  macos-home:
    install: $HOME/.bun/bin/bun install --global dockerfile-language-server-nodejs
    check: '[ -x "$HOME/.bun/bin/docker-langserver" ] || command -v docker-langserver'
    dependencies:
    - bun
  macos-work:
    install: $HOME/.bun/bin/bun install --global dockerfile-language-server-nodejs
    check: '[ -x "$HOME/.bun/bin/docker-langserver" ] || command -v docker-langserver'
    dependencies:
    - bun
  arch-home:
    install: bun install --global dockerfile-language-server-nodejs
    check: command -v docker-langserver
    dependencies:
    - bun
