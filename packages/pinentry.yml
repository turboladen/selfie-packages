---
name: pinentry
version: 0.1.0
homepage: https://github.com/GPGTools/pinenetry
description: |
  a collection of PIN or passphrase entry dialogs which utilize the Assuan
  protocol as specified in the Libassuan manual.

environments:
  macos-home:
    install: brew install pinentry pinentry-mac
    check: |
      command -v pinentry \
      && command -v pinentry-mac
    dependencies:
      - homebrew

  macos-work:
    install: brew install pinentry pinentry-mac
    check: |
      command -v pinentry \
      && command -v pinentry-mac
    dependencies:
      - homebrew

