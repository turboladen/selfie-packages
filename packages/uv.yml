name: uv
version: 0.1.0
homepage: https://docs.astral.sh/uv/
description: Fast Python package and project manager
environments:
  macos-work:
    install: |
      set -e
      curl -LsSf https://astral.sh/uv/install.sh | sh
      # Source the environment to make uv available immediately
      source ~/.local/bin/env
    check: command -v uv
    dependencies:
    - curl
  macos-home:
    install: |
      set -e
      curl -LsSf https://astral.sh/uv/install.sh | sh
      # Source the environment to make uv available immediately
      source ~/.local/bin/env
    check: command -v uv
    dependencies:
    - curl
  arch-home:
    install: |
      set -e
      sudo pacman -S --noconfirm --needed uv || \
        curl -LsSf https://astral.sh/uv/install.sh | sh
    check: command -v uv
    dependencies: []
