name: font-symbols-only-nerd-font
version: 0.1.0
homepage: https://github.com/ryanoasis/nerd-fonts
description: Symbols Nerd Font (Symbols Only)
environments:
  macos-work:
    install: brew install --cask font-symbols-only-nerd-font
    check: 'fc-list : family | grep ''Symbols Nerd Font'''
    dependencies:
    - homebrew
    - fontconfig
  macos-home:
    install: brew install --cask font-symbols-only-nerd-font
    check: 'fc-list : family | grep ''Symbols Nerd Font'''
    dependencies:
    - homebrew
    - fontconfig
