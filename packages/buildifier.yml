---
name: buildifier
version: "0.1.0"
homepage: https://github.com/bazelbuild/buildtools
description: Format bazel BUILD files with a standard convention

_macos: &macos
  install: brew install buildifier
  check: command -v buildifier
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos
