---
name: jq
version: 0.1.0
homepage: https://github.com/jqlang/jq
description: Command-line JSON processor

environments:
  macos-home:
    install: brew install jq
    check: command -v jq
    dependencies:
      - homebrew

  macos-work:
    install: brew install jq
    check: command -v jq
    dependencies:
      - homebrew

  arch-home:
    install: sudo pacman -S --noconfirm --needed jq
    check: command -v jq
    dependencies: []
