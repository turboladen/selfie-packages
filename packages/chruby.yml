---
name: chruby
version: "0.1.0"
homepage: https://github.com/postmodern/chruby
description: Changes the current Ruby

environments:
  macos-work:
    install: brew install chruby-fish
    check: type --type chruby
    dependencies:
      - homebrew

  arch-home:
    install: paru --sync --noconfirm --needed chruby-fish
    check: type --type chruby
    dependencies:
      - paru
