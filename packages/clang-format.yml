name: clang-format
version: 0.1.0
homepage: https://clang.llvm.org/docs/ClangFormat.html
description: |
  clang-format is located in clang/tools/clang-format and can be used to format
  C/C++/Java/JavaScript/JSON/Objective-C/Protobuf/C# code.
environments:
  macos-home:
    install: echo "(Installed via llvm)"
    check: command -v clang-format
    dependencies:
    - llvm
  macos-work:
    install: echo "(Installed via llvm)"
    check: command -v clang-format
    dependencies:
    - llvm
  arch-home:
    install: sudo pacman -S --noconfirm --needed clang
    check: command -v clang-format
    dependencies: []
