---
name: fzf
version: "0.1.0"
homepage: https://github.com/junegunn/fzf
description: 🌸 A command-line fuzzy finder

_macos: &macos
  install: brew install fzf
  check: command -v fzf
  dependencies:
    - homebrew

environments:
  macos-home: *macos
  macos-work: *macos

  arch-home:
    install: sudo pacman -S --noconfirm --needed fzf
    check: command -v fzf
    dependencies: []
