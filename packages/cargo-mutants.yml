---
name: cargo-mutants
version: 0.1.0
homepage: https://github.com/sourcefrog/cargo-mutants
description: 🧟 Inject bugs and see if your tests catch them! 

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-mutants
  check: command -v cargo-mutants
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
