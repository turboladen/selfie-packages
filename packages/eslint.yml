---
name: eslint
version: "0.1.0"
homepage: 
description: 

# Prefer the `npm` method, so as to not have the OS package manager install Node things.
_default_environment: &default_env
  install: npm install --global eslint
  check: command -v eslint
  dependencies:
    - nodejs

environments:
  macos-work:
    <<: *default_env
  arch-home:
    <<: *default_env
