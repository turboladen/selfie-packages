---
name: eslint
version: "0.1.0"
homepage: https://eslint.org/
description: Find and fix problems in your JavaScript code

_bun_install: &bun_install
  install: bun install --global eslint
  check: command -v eslint
  dependencies:
    - bun

environments:
  macos-home: *bun_install
  macos-work: *bun_install
  arch-home: *bun_install
