---
name: orbstack
version: 0.1.0
homepage: https://orbstack.dev/
description: |
  OrbStack is the fast, light, and easy way to run Docker containers and Linux.
  Develop at lightspeed with our Docker Desktop alternative.

_brew: &brew
  install: brew install --cask orbstack
  check: ls /Applications/OrbStack*.app/ &> /dev/null
  dependencies: [homebrew]

environments:
  macos-home: *brew
