name: font-source-code-pro-for-powerline
version: 0.1.0
homepage: https://github.com/powerline/fonts/tree/master/SourceCodePro
description: Source Code Pro for Powerline
environments:
  macos-home:
    install: brew install --cask font-source-code-pro-for-powerline
    check: 'fc-list : family | grep ''Source Code Pro for Powerline'''
    dependencies:
    - homebrew
    - fontconfig
  macos-work:
    install: brew install --cask font-source-code-pro-for-powerline
    check: 'fc-list : family | grep ''Source Code Pro for Powerline'''
    dependencies:
    - homebrew
    - fontconfig
