---
name: cargo-bloat
version: 0.1.0
homepage: https://github.com/RazrFalcon/cargo-bloat
description: Find out what takes most of the space in your executable. 

_cargo_binstall: &cargo_binstall
  install: cargo binstall --no-confirm cargo-bloat
  check: command -v cargo-bloat
  dependencies:
    - cargo-binstall

environments:
  macos-home: *cargo_binstall
  macos-work: *cargo_binstall
  arch-home: *cargo_binstall
